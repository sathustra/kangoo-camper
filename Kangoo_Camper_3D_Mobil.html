<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Kangoo Maxi Micro-Camper — 3D</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;overflow-x:hidden;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#2a2a3a;color:#e0e0e0;padding:10px;padding-bottom:40px;}
h1{font-size:17px;font-weight:500;color:#fff;line-height:1.3;}
.sub{font-size:11px;color:#888;margin:2px 0 8px;}
#cv{width:100%;aspect-ratio:4/3;max-height:70vh;border-radius:10px;overflow:hidden;border:1px solid #444;cursor:grab;touch-action:none;}
.row{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;}
.row button{background:#333;color:#ccc;border:1px solid #555;border-radius:7px;padding:7px 10px;font-size:12px;cursor:pointer;flex:0 0 auto;white-space:nowrap;touch-action:manipulation;}
.row button:active{background:#555;}
.row button.a{border:2px solid #5599ff;background:#2a3a5a;color:#fff;}
.leg{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px;}
.leg span{display:inline-flex;align-items:center;gap:3px;font-size:10px;color:#888;}
.leg .d{width:8px;height:8px;border-radius:2px;display:inline-block;}
#inf{margin-top:8px;padding:8px 10px;background:#333;border-radius:8px;font-size:11px;color:#aaa;line-height:1.5;}
#inf b{color:#ddd;}
.tip{font-size:10px;color:#666;margin-top:6px;text-align:center;}
@media(min-width:700px){
  #cv{aspect-ratio:16/10;}
  .row button{padding:8px 14px;font-size:13px;}
}
</style>
</head>
<body>
<h1>Kangoo Maxi — Micro-Camper 3D</h1>
<p class="sub">Wall-to-Wall Bett 120×195 · Halber Rahmen 70cm · Doppel-Heckküche</p>
<div id="cv"></div>
<div class="row">
  <button id="bDay" class="a">☀️ Sofa</button>
  <button id="bNight">🌙 Bett</button>
  <button id="bK1">🍳 Küche</button>
  <button id="bK2">💧 Tanks</button>
  <button id="bCut">👁 Hülle</button>
</div>
<div class="row">
  <button id="bTop">⬆ Oben</button>
  <button id="bRear">⬅ Heck</button>
  <button id="bIn">👀 Innen</button>
  <button id="b3d">🔄 3D</button>
</div>
<div class="leg">
  <span><span class="d" style="background:#c8a060"></span>Rahmen</span>
  <span><span class="d" style="background:#dcc080"></span>Fest</span>
  <span><span class="d" style="background:#f0d898"></span>Mobil</span>
  <span><span class="d" style="background:#7060bb"></span>70cm</span>
  <span><span class="d" style="background:#6555aa"></span>50cm</span>
  <span><span class="d" style="background:#8a6530"></span>Küche</span>
  <span><span class="d" style="background:#4682B4"></span>Tanks</span>
  <span><span class="d" style="background:#22aa88"></span>Boxen</span>
  <span><span class="d" style="background:#50ddaa"></span>Gang</span>
</div>
<div id="inf"></div>
<p class="tip">1 Finger = Drehen · 2 Finger / Pinch = Zoom</p>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){
const S=0.001,cv=document.getElementById('cv'),inf=document.getElementById('inf');
let W=cv.clientWidth,H=cv.clientHeight;
const sc=new THREE.Scene(),cam=new THREE.PerspectiveCamera(38,W/H,0.05,60);
const rn=new THREE.WebGLRenderer({antialias:true});
rn.setSize(W,H);rn.setPixelRatio(Math.min(devicePixelRatio,2));
rn.shadowMap.enabled=true;rn.shadowMap.type=THREE.PCFSoftShadowMap;
rn.setClearColor(0x556677,1);cv.appendChild(rn.domElement);
sc.add(new THREE.AmbientLight(0xd8e0e8,0.55));
const sn=new THREE.DirectionalLight(0xfff6e0,0.9);sn.position.set(5,9,7);sn.castShadow=true;sn.shadow.mapSize.set(1024,1024);sn.shadow.camera.left=-7;sn.shadow.camera.right=7;sn.shadow.camera.top=5;sn.shadow.camera.bottom=-5;sn.shadow.bias=-0.002;sc.add(sn);
sc.add(new THREE.DirectionalLight(0x99aacc,0.25).translateX(-4).translateY(4).translateZ(-5));
sc.add(new THREE.HemisphereLight(0x8899bb,0x445533,0.3));
sc.add(new THREE.Mesh(new THREE.PlaneGeometry(50,50),new THREE.MeshStandardMaterial({color:0x6a6a6a,roughness:0.92})).rotateX(-Math.PI/2));
function mkT(a,b){const v=document.createElement('canvas');v.width=128;v.height=128;const x=v.getContext('2d');x.fillStyle=a;x.fillRect(0,0,128,128);x.strokeStyle=b;x.lineWidth=1;for(let i=0;i<128;i+=4){x.globalAlpha=.1+Math.random()*.15;x.beginPath();x.moveTo(0,i);x.lineTo(128,i+Math.random()*2);x.stroke();}return new THREE.CanvasTexture(v);}
const M={wh:new THREE.MeshStandardMaterial({color:0xf0f0ec,roughness:.45,metalness:.05}),bp:new THREE.MeshStandardMaterial({color:0x3a3a3a,roughness:.85}),cl:new THREE.MeshStandardMaterial({color:0x2e2e2e,roughness:.8}),gl:new THREE.MeshStandardMaterial({color:0x4477aa,transparent:true,opacity:.25}),ti:new THREE.MeshStandardMaterial({color:0x1a1a1a,roughness:.95}),ri:new THREE.MeshStandardMaterial({color:0xbbb,metalness:.8,roughness:.25}),rc:new THREE.MeshStandardMaterial({color:0x999,metalness:.7,roughness:.3}),ch:new THREE.MeshStandardMaterial({color:0xddd,metalness:.9,roughness:.1}),hl:new THREE.MeshStandardMaterial({color:0xeeeedd,transparent:true,opacity:.6}),tl:new THREE.MeshStandardMaterial({color:0xcc2222,transparent:true,opacity:.8}),tw:new THREE.MeshStandardMaterial({color:0xeee,transparent:true,opacity:.7}),se:new THREE.MeshStandardMaterial({color:0xaaa89a,roughness:.7}),lf:new THREE.MeshStandardMaterial({color:0x5a4530,roughness:.7}),gr:new THREE.MeshStandardMaterial({color:0x222,roughness:.6,transparent:true,opacity:.6}),ub:new THREE.MeshStandardMaterial({color:0x222,roughness:.9}),iw:new THREE.MeshStandardMaterial({color:0x333,roughness:.8}),wd:new THREE.MeshStandardMaterial({map:mkT('#c8a060','#a08040'),roughness:.55}),wl:new THREE.MeshStandardMaterial({map:mkT('#ddb870','#bb9a50'),roughness:.5}),wD:new THREE.MeshStandardMaterial({map:mkT('#8a6530','#6a5020'),roughness:.6}),mt1:new THREE.MeshStandardMaterial({color:0x7060bb,roughness:.8}),mt2:new THREE.MeshStandardMaterial({color:0x6555aa,roughness:.8}),tk:new THREE.MeshStandardMaterial({color:0x4682B4,transparent:true,opacity:.6}),tkW:new THREE.MeshStandardMaterial({color:0x556688,transparent:true,opacity:.5}),eb:new THREE.MeshStandardMaterial({color:0x22aa88,transparent:true,opacity:.45}),ck:new THREE.MeshStandardMaterial({color:0x1a1a1a,metalness:.5,roughness:.4}),sk:new THREE.MeshStandardMaterial({color:0xccc,metalness:.7,roughness:.15}),fr:new THREE.MeshStandardMaterial({color:0x50ddaa,transparent:true,opacity:.12}),fe:new THREE.LineBasicMaterial({color:0x50ddaa,transparent:true,opacity:.5}),hd:new THREE.MeshStandardMaterial({color:0x666,metalness:.6,roughness:.3}),le:new THREE.MeshStandardMaterial({color:0xffffcc,emissive:0xffeeaa,emissiveIntensity:0}),ra:new THREE.MeshStandardMaterial({color:0x555,metalness:.7,roughness:.3}),lg:new THREE.MeshStandardMaterial({color:0xcc9944,roughness:.45}),hi:new THREE.MeshStandardMaterial({color:0x888,metalness:.8,roughness:.2})};
function bx(w,h,d,m,x,y,z){const o=new THREE.Mesh(new THREE.BoxGeometry(w*S,h*S,d*S),m);o.position.set(x*S,y*S,z*S);o.castShadow=true;o.receiveShadow=true;return o;}
function cy(r,h,m,x,y,z,s2){const o=new THREE.Mesh(new THREE.CylinderGeometry(r*S,r*S,h*S,s2||16),m);o.position.set(x*S,y*S,z*S);o.castShadow=true;return o;}
const root=new THREE.Group();sc.add(root);
const VL=4597,VW=1829,VH=1840,WB=3081,fH=560,LRWR=1210,LRL=1950,LRH=1129;

// Vehicle
const cG=new THREE.Group();root.add(cG);
cG.add(bx(VW-100,fH-100,VL,M.ub,0,(fH-100)/2,0));const mH2=VH-fH-120;
cG.add(bx(VW,mH2,VL-500,M.wh,0,fH+mH2/2,50));cG.add(bx(VW-60,80,VL-250,M.wh,0,VH-40,50));
cG.add(bx(VW-80,250,650,M.wh,0,fH+95,-VL/2+375));
cG.add(bx(VW+20,280,130,M.bp,0,fH-110,-VL/2-15));cG.add(bx(VW-200,180,60,M.bp,0,fH-250,-VL/2+40));
cG.add(bx(VW+20,180,100,M.bp,0,fH-90,VL/2+10));
for(let s of[-1,1])cG.add(bx(20,320,VL-1100,M.cl,s*(VW/2-10),fH-40,200));
cG.add(bx(VW-200,35,70,M.ch,0,fH+300,-VL/2+500));
for(let s of[-1,1]){cG.add(bx(280,150,90,M.hl,s*580,fH+280,-VL/2+220));cG.add(bx(290,160,15,M.ch,s*580,fH+280,-VL/2+175));}
for(let s of[-1,1]){const t=new THREE.Group();t.add(bx(140,200,35,M.tl,0,25,0));t.add(bx(140,70,35,M.tw,0,-75,0));t.position.set(s*680*S,(fH+350)*S,(VL/2-20)*S);cG.add(t);}
const ws2=bx(VW-300,520,18,M.gl,0,fH+mH2-200,-VL/2+750);ws2.rotation.x=.18;cG.add(ws2);
cG.add(bx(350,380,18,M.gl,-200,fH+mH2-200,VL/2-60));cG.add(bx(350,380,18,M.gl,200,fH+mH2-200,VL/2-60));
for(let s of[-1,1]){cG.add(bx(18,360,440,M.gl,s*(VW/2-15),fH+mH2-240,-VL/2+1100));cG.add(bx(18,320,520,M.gl,s*(VW/2-15),fH+mH2-260,-VL/2+1680));cG.add(bx(18,320,460,M.gl,s*(VW/2-15),fH+mH2-260,VL/2-360));}
for(let s of[-1,1]){cG.add(bx(170,22,45,M.cl,s*(VW/2+85),fH+mH2-240,-VL/2+870));cG.add(bx(95,140,22,M.cl,s*(VW/2+170),fH+mH2-240,-VL/2+870));}
function mkWh(x,z){const w=new THREE.Group();const tr=new THREE.Mesh(new THREE.TorusGeometry(265*S,92*S,10,20),M.ti);tr.rotation.y=Math.PI/2;tr.castShadow=true;w.add(tr);const d=cy(195,65,M.ri,0,0,0,16);d.rotation.x=Math.PI/2;w.add(d);const h2=cy(65,75,M.rc,0,0,0,8);h2.rotation.x=Math.PI/2;w.add(h2);for(let i=0;i<8;i++){const a=i*Math.PI/4;const dt=cy(16,78,M.rc,Math.cos(a)*135,Math.sin(a)*135,0,6);dt.rotation.x=Math.PI/2;w.add(dt);}w.position.set(x*S,265*S,z*S);return w;}
for(let s of[-1,1]){cG.add(mkWh(s*(VW/2+50),-VL/2+750));cG.add(mkWh(s*(VW/2+50),-VL/2+750+WB));}
const cE=-VL/2+1250,lS=cE+60,lCZ=lS+LRL/2;
cG.add(bx(LRWR+40,12,LRL+100,M.lf,0,fH+6,lCZ));
cG.add(bx(LRWR+40,LRH-80,18,M.gr,0,fH+LRH/2-20,lS-10));
for(let s of[-1,1]){const sg=new THREE.Group();sg.add(bx(400,80,400,M.se,0,40,0));sg.add(bx(400,480,90,M.se,0,320,-150));sg.add(bx(110,170,90,M.se,0,540,-150));sg.position.set(s*340*S,(fH+15)*S,(cE-400)*S);cG.add(sg);}
cG.add(bx(LRWR,VH-fH-100,18,M.iw,0,fH+(VH-fH)/2,cE-830));
for(let s of[-1,1])cG.add(bx(12,LRH-100,LRL+80,M.wh,s*(LRWR/2+20-6),fH+LRH/2-30,lCZ));
cG.add(bx(LRWR+30,12,LRL+80,M.wh,0,fH+LRH-6,lCZ));

// Camper
const iG=new THREE.Group();iG.position.set(0,(fH+15)*S,lCZ*S);root.add(iG);
const fullW=1200,frameW=700,gangW=500,BL=1950,fHt=350,sH=15,matH=80;
const frameL=-LRWR/2,frameR=frameL+frameW,frameCX=frameL+frameW/2;
const legH=fHt-25;const frG=new THREE.Group();iG.add(frG);
for(const xi of[frameCX-280,frameCX,frameCX+280])for(let z=-BL/2+100;z<=BL/2-250;z+=500)frG.add(bx(40,fHt-40,40,M.wd,xi,(fHt-40)/2,z));
for(let i=0;i<5;i++){const z=-BL/2+100+i*((BL-300)/4);frG.add(bx(frameW-30,38,38,M.wd,frameCX,fHt-19,z));}
frG.add(bx(45,45,BL-20,M.wd,frameL+28,fHt+2,0));frG.add(bx(45,45,BL-20,M.wd,frameR-28,fHt+2,0));
frG.add(bx(20,5,BL-40,M.ra,frameR-28,fHt+27,0));
frG.add(bx(15,fHt,BL-10,M.wD,frameL-7,fHt/2,0));frG.add(bx(15,fHt*.45,BL-10,M.wD,frameR+7,fHt*.225,0));
frG.add(bx(frameW+20,fHt,15,M.wd,frameCX,fHt/2,-BL/2+7));

const kitW=650,kitD=720,upH=145,loH=135;
const upBot=fHt-10-upH,loBot=10;
const railLen=BL/2-15,railCZ=railLen/2;
const rlX=frameCX-kitW/2+70,rrX=frameCX+kitW/2-70;
frG.add(bx(10,10,railLen,M.ra,rlX,upBot+upH+5,railCZ));frG.add(bx(10,10,railLen,M.ra,rrX,upBot+upH+5,railCZ));
frG.add(bx(10,10,railLen,M.ra,rlX,loBot+loH+5,railCZ));frG.add(bx(10,10,railLen,M.ra,rrX,loBot+loH+5,railCZ));

const slW=68,slGp=14,nSl=Math.floor((BL-160)/(slW+slGp));
for(let i=0;i<nSl;i++){const z=-BL/2+80+i*(slW+slGp)+slW/2;frG.add(bx(frameW-40,sH,slW,M.wl,frameCX,fHt+25+sH/2,z));}

const mobW=gangW-10,mG=new THREE.Group();frG.add(mG);
mG.add(bx(mobW,sH,BL-150,M.wl,0,fHt+25-sH/2,0));
for(let i=0;i<nSl;i++){const z=-BL/2+80+slW/2+slGp/2+i*(slW+slGp);mG.add(bx(mobW,sH,slW,M.wl,0,fHt+25+sH/2,z));}
mG.add(bx(28,38,BL-160,M.wd,mobW/2-14,fHt+8,0));
const legPX=mobW/2-5,legPY=fHt;
function mkLeg(pz){const g=new THREE.Group();g.position.set(legPX*S,legPY*S,pz*S);g.add(cy(8,48,M.hi,0,0,0,8));g.add(bx(36,legH,36,M.lg,0,-legH/2-5,0));g.add(bx(55,10,55,M.hd,0,-legH-5,0));return g;}
const lg1=mkLeg(-BL/2+500);mG.add(lg1);const lg2=mkLeg(BL/2-500);mG.add(lg2);
const STOWED=-Math.PI/2,DEPLOYED=0;lg1.rotation.z=STOWED;lg2.rotation.z=STOWED;
const mobDayX=frameCX,mobNightX=frameR+mobW/2+8;mG.position.x=mobDayX*S;

const slatTop=fHt+25+sH;
const mat1=bx(700-10,matH,BL-50,M.mt1,frameCX,slatTop+matH/2,0);iG.add(mat1);
const mat2=new THREE.Group();mat2.add(bx(500-10,matH,BL-50,M.mt2,0,0,0));iG.add(mat2);
const dayM2X=frameL+matH/2+5,dayM2Y=slatTop+250,dayM2R=-Math.PI/2;
const nightM2X=frameR+250-5,nightM2Y=slatTop+matH/2,nightM2R=0;
mat2.position.set(dayM2X*S,dayM2Y*S,0);mat2.rotation.z=dayM2R;

for(let i=0;i<3;i++)frG.add(bx(380,310,280,M.eb,frameCX-100+i*30,160,-BL/2+180+i*310));

function mkDr(w,h,d,mat){const g=new THREE.Group();g.add(bx(w,10,d,mat,0,0,0));g.add(bx(10,h,d,mat,-w/2+5,h/2+5,0));g.add(bx(10,h,d,mat,w/2-5,h/2+5,0));g.add(bx(w-20,h,10,mat,0,h/2+5,-d/2+5));return g;}
const upG=new THREE.Group();upG.add(mkDr(kitW,upH,kitD,M.wD));
upG.add(bx(kitW,upH-5,12,M.wd,0,upH/2+3,kitD/2-6));upG.add(bx(130,10,12,M.hd,0,upH/2+3,kitD/2+2));
upG.add(bx(10,upH-15,kitD-30,M.wd,0,upH/2,0));
upG.add(cy(55,16,M.sk,-kitW/4+10,upH+15,60));
const fau=new THREE.Group();fau.add(cy(5,70,M.hd,0,35,0));fau.add(bx(5,5,28,M.hd,0,70,14));
fau.position.set((-kitW/4+65)*S,(upH+10)*S,0);upG.add(fau);
upG.add(bx(150,16,130,M.ck,kitW/4-5,upH+15,30));upG.add(cy(26,7,M.hd,kitW/4-30,upH+26,20));upG.add(cy(20,7,M.hd,kitW/4+25,upH+26,0));
upG.add(bx(kitW/2-30,upH-20,150,M.wl,kitW/4,upH/2,-kitD/2+90));
const upRestZ=(BL/2-15-kitD/2)*S,upOutZ=(BL/2+kitD/2+80)*S;
upG.position.set(frameCX*S,upBot*S,upRestZ);frG.add(upG);

const loG=new THREE.Group();loG.add(mkDr(kitW,loH,kitD,M.wD));

loG.add(bx(kitW/2-30,loH-15,280,M.tkW,kitW/4,loH/2,50));
loG.add(cy(18,60,M.hd,-kitW/4+80,loH/2,-kitD/2+100,8));
const loRestZ=(BL/2-15-kitD/2)*S,loOutZ=(BL/2+kitD/2+80)*S;
loG.position.set(frameCX*S,loBot*S,loRestZ);frG.add(loG);

const gangCX=frameR+gangW/2;
const fZ=bx(gangW,LRH-300,BL-50,M.fr,gangCX,(LRH-300)/2+15,0);iG.add(fZ);
const fE=new THREE.LineSegments(new THREE.EdgesGeometry(new THREE.BoxGeometry(gangW*S,(LRH-300)*S,(BL-50)*S)),M.fe);
fE.position.copy(fZ.position);iG.add(fE);
iG.add(bx(16,7,LRL-80,M.le,-LRWR/2+50,LRH-28,0));iG.add(bx(16,7,LRL-80,M.le,LRWR/2-50,LRH-28,0));

// Controls
let isNight=false,k1O=false,k2O=false,aBed=false,aK1=false,aK2=false,aT=0,aT1=0,aT2=0;
function cls(id,on){document.getElementById(id).className=on?'a':'';}
function uInf(){
  let h=isNight?'<b>Bett:</b> 1200×1950mm wall-to-wall. Matratze 70+50cm flach.':'<b>Sofa:</b> 70cm Sitz + 50cm Lehne. <span style="color:#50ddaa"><b>500mm Gang frei.</b></span>';
  h+='<br>🍳 '+(k1O?'<b style="color:#c8a060">Oben offen</b> — Kocher + Spüle':'Oben zu');
  h+=' · 💧 '+(k2O?'<b style="color:#4682B4">Unten offen</b> — 2×12L Tanks':'Unten zu');
  inf.innerHTML=h;
}uInf();
function tBed(n){if(aBed||n===isNight)return;isNight=n;aBed=true;aT=0;cls('bDay',!n);cls('bNight',n);}
function tK(n){if(n===1){if(aK1)return;k1O=!k1O;aK1=true;aT1=0;cls('bK1',k1O);}else{if(aK2)return;k2O=!k2O;aK2=true;aT2=0;cls('bK2',k2O);}}
document.getElementById('bDay').onclick=()=>tBed(false);
document.getElementById('bNight').onclick=()=>tBed(true);
document.getElementById('bK1').onclick=()=>tK(1);
document.getElementById('bK2').onclick=()=>tK(2);
document.getElementById('bCut').onclick=()=>{cG.visible=!cG.visible;};

// Camera
let th=.5,ph=.75,rd=6.5;const lY=1.05,lZ=lCZ*S;
function uC(){cam.position.x=rd*Math.sin(ph)*Math.cos(th);cam.position.y=lY+rd*Math.cos(ph);cam.position.z=lZ+rd*Math.sin(ph)*Math.sin(th);cam.lookAt(0,lY,lZ);}uC();
document.getElementById('b3d').onclick=()=>{th=.5;ph=.75;rd=6.5;uC();};
document.getElementById('bTop').onclick=()=>{th=0;ph=.05;rd=4.5;uC();};
document.getElementById('bRear').onclick=()=>{th=Math.PI;ph=Math.PI/2.3;rd=5;uC();};
document.getElementById('bIn').onclick=()=>{th=Math.PI*.95;ph=Math.PI/2.5;rd=2.5;uC();};

// Touch + Mouse input
let isDr=false,px=0,py=0;
let pinchDist=0;

cv.addEventListener('mousedown',e=>{isDr=true;px=e.clientX;py=e.clientY;cv.style.cursor='grabbing';});
window.addEventListener('mouseup',()=>{isDr=false;cv.style.cursor='grab';});
window.addEventListener('mousemove',e=>{if(!isDr)return;th-=(e.clientX-px)*.005;ph=Math.max(.05,Math.min(3,ph-(e.clientY-py)*.005));px=e.clientX;py=e.clientY;uC();});
cv.addEventListener('wheel',e=>{e.preventDefault();rd=Math.max(1.5,Math.min(14,rd+e.deltaY*.004));uC();},{passive:false});

cv.addEventListener('touchstart',e=>{
  e.preventDefault();
  if(e.touches.length===1){isDr=true;px=e.touches[0].clientX;py=e.touches[0].clientY;}
  if(e.touches.length===2){isDr=false;const dx=e.touches[0].clientX-e.touches[1].clientX;const dy=e.touches[0].clientY-e.touches[1].clientY;pinchDist=Math.sqrt(dx*dx+dy*dy);}
},{passive:false});
cv.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(e.touches.length===1&&isDr){
    const cx=e.touches[0].clientX,cy2=e.touches[0].clientY;
    th-=(cx-px)*.008;ph=Math.max(.05,Math.min(3,ph-(cy2-py)*.008));
    px=cx;py=cy2;uC();
  }
  if(e.touches.length===2){
    const dx=e.touches[0].clientX-e.touches[1].clientX;const dy=e.touches[0].clientY-e.touches[1].clientY;
    const dist=Math.sqrt(dx*dx+dy*dy);
    rd=Math.max(1.5,Math.min(14,rd-(dist-pinchDist)*.015));
    pinchDist=dist;uC();
  }
},{passive:false});
cv.addEventListener('touchend',e=>{e.preventDefault();isDr=false;},{passive:false});

// Resize
window.addEventListener('resize',()=>{
  W=cv.clientWidth;H=cv.clientHeight;
  cam.aspect=W/H;cam.updateProjectionMatrix();rn.setSize(W,H);
});

// Animate
function ease(t){return t<.5?2*t*t:1-Math.pow(-2*t+2,2)/2;}
function an(){
  requestAnimationFrame(an);
  if(aBed){
    aT+=.011;const t=Math.min(1,aT),e=ease(t);
    if(isNight){
      const sl=Math.min(1,e/.5),lg=Math.max(0,Math.min(1,(e-.5)/.3)),mt=Math.max(0,Math.min(1,(e-.3)/.7));
      mG.position.x=THREE.MathUtils.lerp(mobDayX*S,mobNightX*S,sl);
      lg1.rotation.z=THREE.MathUtils.lerp(STOWED,DEPLOYED,lg);lg2.rotation.z=lg1.rotation.z;
      mat2.position.x=THREE.MathUtils.lerp(dayM2X*S,nightM2X*S,mt);
      mat2.position.y=THREE.MathUtils.lerp(dayM2Y*S,nightM2Y*S,mt);
      mat2.rotation.z=THREE.MathUtils.lerp(dayM2R,nightM2R,mt);
      fZ.material.opacity=.12*(1-e);M.fe.opacity=.5*(1-e);M.le.emissiveIntensity=e*.6;
    }else{
      const mt=Math.min(1,e/.5),lg=Math.max(0,Math.min(1,(e-.3)/.3)),sl=Math.max(0,Math.min(1,(e-.5)/.5));
      mat2.position.x=THREE.MathUtils.lerp(nightM2X*S,dayM2X*S,mt);
      mat2.position.y=THREE.MathUtils.lerp(nightM2Y*S,dayM2Y*S,mt);
      mat2.rotation.z=THREE.MathUtils.lerp(nightM2R,dayM2R,mt);
      lg1.rotation.z=THREE.MathUtils.lerp(DEPLOYED,STOWED,lg);lg2.rotation.z=lg1.rotation.z;
      mG.position.x=THREE.MathUtils.lerp(mobNightX*S,mobDayX*S,sl);
      fZ.material.opacity=.12*e;M.fe.opacity=.5*e;M.le.emissiveIntensity=(1-e)*.6;
    }
    if(t>=1){aBed=false;uInf();}
  }
  if(aK1){aT1+=.014;const t=Math.min(1,aT1),e=ease(t);upG.position.z=k1O?THREE.MathUtils.lerp(upRestZ,upOutZ,e):THREE.MathUtils.lerp(upOutZ,upRestZ,e);if(t>=1){aK1=false;uInf();}}
  if(aK2){aT2+=.014;const t=Math.min(1,aT2),e=ease(t);loG.position.z=k2O?THREE.MathUtils.lerp(loRestZ,loOutZ,e):THREE.MathUtils.lerp(loOutZ,loRestZ,e);if(t>=1){aK2=false;uInf();}}
  rn.render(sc,cam);
}an();
})();
</script>
